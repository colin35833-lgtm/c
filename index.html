<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
  <meta name="version" content="1.9.1">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作主页</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#f5f5f7;color:#1d1d1f;padding:20px;min-height:100vh}
.container{max-width:1400px;margin:0 auto}
.header{margin-bottom:20px}
.header h1{font-size:22px;font-weight:600;letter-spacing:-0.3px;color:#1d1d1f}
.header p{font-size:13px;color:#86868b;margin-top:2px}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.06)}
.card-title{font-size:15px;font-weight:600;margin-bottom:14px;color:#1d1d1f;display:flex;align-items:center;gap:8px}
.card-title .icon{width:20px;height:20px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;color:#fff;flex-shrink:0}
.income-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px}
.income-item{background:#fafafa;border-radius:10px;padding:16px;border:1px solid rgba(0,0,0,.04)}
.income-label{font-size:12px;color:#86868b;margin-bottom:6px}
.income-value{font-size:26px;font-weight:600;display:flex;align-items:center;gap:8px}
.income-value .symbol{font-size:18px;color:#86868b;font-weight:400}
.income-static{font-size:26px;font-weight:600;color:#1d1d1f}
.task-row{display:grid;grid-template-columns:750px 1fr;gap:16px;margin-bottom:16px}
.task-col{display:flex;flex-direction:column;gap:16px}
.task-input-row{display:flex;gap:8px;margin-bottom:10px}
.task-input-row input{flex:1;padding:8px 12px;border:1px solid #d2d2d7;border-radius:8px;font-size:13px;outline:none;transition:border-color .2s}
.task-input-row input:focus{border-color:#0066cc}
.task-input-row button{padding:8px 16px;background:#0066cc;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap;transition:background .2s}
.task-input-row button:hover{background:#0055b3}
.task-list{list-style:none}
.task-list li{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;margin-bottom:4px;font-size:13px;transition:all .15s}
.task-list li.pending{background:#e86050}
.task-list li.pending:hover{background:#fac775}
.task-list li.done-item{background:#c0dd97}
.task-list li.done-item:hover{background:#97c459}
.task-list li .task-icon{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;border:1.5px solid #d2d2d7;transition:all .2s;cursor:pointer}
.task-list li.pending .task-icon{background:transparent;border-color:#c7c7cc}
.task-list li.pending .task-icon:hover{border-color:#0066cc;background:#e6f1fb}
.task-list li.done-item .task-icon{background:#34c759;border-color:#34c759;color:#fff}
.task-list li .task-text{flex:1;cursor:pointer;padding:2px 0}
.task-list li.pending .task-text{color:#1d1d1f}
.task-list li.done-item .task-text{text-decoration:line-through;text-decoration-thickness:2.5px;color:#3b6d11}
.task-list li .del-btn{width:22px;height:22px;border:none;background:transparent;color:#c7c7cc;cursor:pointer;border-radius:4px;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:opacity .2s,color .2s}
.task-list li:hover .del-btn{opacity:1}
.task-list li .del-btn:hover{color:#a32d2d;background:#fcebeb}
#devTaskList .pending{background:#fafafa}
#devTaskList .pending:hover{background:#f0f0f2}

.mm-toolbar{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.mm-toolbar button{padding:5px 12px;border:1px solid #d2d2d7;border-radius:7px;font-size:12px;cursor:pointer;background:#fff;color:#1d1d1f;transition:all .15s}
.mm-toolbar button:hover{background:#f5f5f7;border-color:#c7c7cc}
.mm-toolbar .mm-p{background:#7c3aed;color:#fff;border-color:#7c3aed}
.mm-toolbar .mm-p:hover{background:#6d28d9}
.mm-list{list-style:none}
.mm-list .mm-parent{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:8px;margin-bottom:3px;font-size:13px;transition:all .15s;background:#f5f3ff}
.mm-list .mm-parent:hover{background:#ede9fe}
.mm-list .mm-parent .mm-arrow{width:16px;height:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#7c3aed;flex-shrink:0;cursor:pointer;transition:transform .2s;background:transparent;border:none;padding:0}
.mm-list .mm-parent .mm-arrow.open{transform:rotate(90deg)}
.mm-list .mm-parent .mm-icon{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;border:1.5px solid #c7c7cc;cursor:pointer;transition:all .2s;background:transparent;color:transparent}
.mm-list .mm-parent.done .mm-icon{background:#34c759;border-color:#34c759;color:#fff}
.mm-list .mm-parent .mm-label{flex:1;cursor:pointer;padding:2px 0;color:#1d1d1f;min-width:0}
.mm-list .mm-parent.done .mm-label{text-decoration:line-through;text-decoration-thickness:2.5px;color:#3b6d11}
.mm-list .mm-parent .mm-add-child{width:20px;height:20px;border:none;background:transparent;color:#c7c7cc;cursor:pointer;border-radius:4px;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:opacity .2s,color .2s}
.mm-list .mm-parent:hover .mm-add-child{opacity:1}
.mm-list .mm-parent .mm-add-child:hover{color:#7c3aed}
.mm-list .mm-parent .mm-del{width:20px;height:20px;border:none;background:transparent;color:#c7c7cc;cursor:pointer;border-radius:4px;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:opacity .2s,color .2s}
.mm-list .mm-parent:hover .mm-del{opacity:1}
.mm-list .mm-parent .mm-del:hover{color:#a32d2d;background:#fcebeb}
.mm-list .mm-child{padding-left:38px}
.mm-list .mm-child li{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:8px;margin-bottom:2px;font-size:12px;transition:all .15s;background:#fafafa}
.mm-list .mm-child li:hover{background:#f0f0f2}
.mm-list .mm-child li .mm-icon{width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;flex-shrink:0;border:1.5px solid #c7c7cc;cursor:pointer;transition:all .2s;background:transparent;color:transparent}
.mm-list .mm-child li.done .mm-icon{background:#34c759;border-color:#34c759;color:#fff}
.mm-list .mm-child li .mm-label{flex:1;cursor:pointer;padding:2px 0;color:#1d1d1f}
.mm-list .mm-child li.done .mm-label{text-decoration:line-through;text-decoration-thickness:2.5px;color:#3b6d11}
.mm-list .mm-child li .mm-del{width:16px;height:16px;border:none;background:transparent;color:#c7c7cc;cursor:pointer;border-radius:4px;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:opacity .2s,color .2s}
.mm-list .mm-child li:hover .mm-del{opacity:1}
.mm-list .mm-child li .mm-del:hover{color:#a32d2d;background:#fcebeb}
.mm-child.collapsed{display:none}
.mm-empty{display:flex;align-items:center;justify-content:center;color:#c7c7cc;font-size:13px;min-height:100px}

.mm-income-input,.mm-profit-input{width:55px;padding:3px 5px;border:1px solid #d2d2d7;border-radius:5px;font-size:11px;outline:none;text-align:right;transition:border-color .2s;background:#fff}
.mm-income-input:focus,.mm-profit-input:focus{border-color:#0066cc}
.mm-income-input::placeholder,.mm-profit-input::placeholder{color:#c7c7cc}

.lock-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#f5f5f7;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
.lock-overlay.hidden{display:none}
.lock-box{background:#fff;border-radius:16px;padding:32px 36px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.06);text-align:center;max-width:340px;width:100%}
.lock-box h2{font-size:18px;font-weight:600;margin-bottom:4px;color:#1d1d1f}
.lock-box p{font-size:13px;color:#86868b;margin-bottom:20px}
.lock-box input{width:100%;padding:10px 14px;border:1px solid #d2d2d7;border-radius:10px;font-size:15px;outline:none;text-align:center;letter-spacing:4px;transition:border-color .2s;margin-bottom:12px}
.lock-box input:focus{border-color:#0066cc}
.lock-box .lock-error{font-size:12px;color:#a32d2d;min-height:18px;margin-bottom:8px}
.lock-box button{width:100%;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;transition:background .2s}
.lock-box .lock-btn{background:#0066cc;color:#fff}
.lock-box .lock-btn:hover{background:#0055b3}
.lock-box .lock-hint{font-size:11px;color:#c7c7cc;margin-top:12px;cursor:pointer;background:transparent;border:none;padding:0;text-decoration:underline}
.lock-box .lock-hint:hover{color:#0066cc}
.lock-setup{background:#fff;border-radius:16px;padding:32px 36px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.06);text-align:center;max-width:340px;width:100%}
.lock-setup h2{font-size:18px;font-weight:600;margin-bottom:4px;color:#1d1d1f}
.lock-setup p{font-size:13px;color:#86868b;margin-bottom:20px}
.lock-setup input{width:100%;padding:10px 14px;border:1px solid #d2d2d7;border-radius:10px;font-size:15px;outline:none;text-align:center;letter-spacing:4px;transition:border-color .2s;margin-bottom:12px}
.lock-setup input:focus{border-color:#0066cc}
.lock-setup .lock-error{font-size:12px;color:#a32d2d;min-height:18px;margin-bottom:8px}
.lock-setup button{width:100%;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;transition:background .2s}
.lock-setup .lock-btn{background:#34c759;color:#fff}
.lock-setup .lock-btn:hover{background:#2db84d}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d2d2d7;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#c7c7cc}
.mm-parent[draggable="true"],.task-list li[draggable="true"]{cursor:pointer}
.dragging{opacity:.5;outline:2px dashed #0066cc}
.drag-over{position:relative}
.drag-over::before{content:'';position:absolute;top:-2px;left:0;right:0;height:2px;background:#0066cc;border-radius:1px}

/* 链接设置按钮（hover显示） */
.task-list li .link-set{width:22px;height:22px;border:none;background:transparent;color:#c7c7cc;cursor:pointer;border-radius:4px;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:opacity .2s,color .2s}
.task-list li:hover .link-set{opacity:1}
.task-list li .link-set:hover{color:#0066cc;background:#e6f1fb}
.task-list li .task-url{font-size:12px;color:#0066cc;text-decoration:none;padding:2px 6px;border-radius:4px;transition:background .2s;white-space:nowrap;flex-shrink:0}
.task-list li .task-url:hover{background:#e6f1fb;text-decoration:underline}

.mm-list .mm-parent .mm-link-set{width:20px;height:20px;border:none;background:transparent;color:#c7c7cc;cursor:pointer;border-radius:4px;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:opacity .2s,color .2s}
.mm-list .mm-parent:hover .mm-link-set{opacity:1}
.mm-list .mm-parent .mm-link-set:hover{color:#0066cc;background:#e6f1fb}
.mm-list .mm-parent .mm-url{font-size:12px;color:#0066cc;text-decoration:none;padding:4px 10px;border-radius:4px;transition:background .2s;white-space:nowrap;flex-shrink:0}
.mm-list .mm-parent .mm-url:hover{background:#e6f1fb;text-decoration:underline}

.mm-list .mm-child li .mm-link-set{width:16px;height:16px;border:none;background:transparent;color:#c7c7cc;cursor:pointer;border-radius:4px;font-size:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:opacity .2s,color .2s}
.mm-list .mm-child li:hover .mm-link-set{opacity:1}
.mm-list .mm-child li .mm-link-set:hover{color:#0066cc;background:#e6f1fb}
.mm-list .mm-child li .mm-url{font-size:12px;color:#0066cc;text-decoration:none;padding:6px 20px;border-radius:6px;transition:background .2s;white-space:nowrap;flex-shrink:0;font-weight:500}
.mm-list .mm-child li .mm-url:hover{background:#e6f1fb;text-decoration:underline}
</style>
</head>
<body>
<div class="lock-overlay" id="lockOverlay">
  <div class="lock-syncing" id="lockSyncing" style="text-align:center;padding:40px 20px;display:none">
    <h2>🔒 工作主页</h2>
    <p style="color:#86868b;margin-top:12px">正在同步数据...</p>
  </div>
  <div class="lock-box" id="lockBox" style="display:none">
    <h2>🔒 工作主页</h2>
    <p>输入密码解锁</p>
    <input type="password" id="lockPwdInput" placeholder="密码" maxlength="20" autofocus>
    <div class="lock-error" id="lockError"></div>
    <button type="button" class="lock-btn" onclick="ul()">解锁</button>
    <button type="button" class="lock-hint" onclick="ss()">设置新密码</button>
  </div>
  <div class="lock-setup" id="lockSetup" style="display:none">
    <h2>设置密码</h2>
    <p id="setupDesc">首次使用，请设置一个锁屏密码</p>
    <input type="password" id="setupOldPwd" placeholder="旧密码" maxlength="20" style="display:none">
    <input type="password" id="setupPwdInput" placeholder="新密码" maxlength="20" autofocus>
    <input type="password" id="setupPwdConfirm" placeholder="再次输入新密码" maxlength="20">
    <div class="lock-error" id="setupError"></div>
    <button type="button" class="lock-btn" onclick="sp()">确认</button>
    <button type="button" class="lock-hint" id="setupBack" onclick="bl()" style="display:none;margin-top:10px">返回</button>
  </div>
</div>
<div class="container">
  <div class="header" style="display:flex;justify-content:space-between;align-items:center">
    <div>
      <h1>工作主页</h1>
      <p>电商 · 自媒体 · 日常</p>
    </div>
    <div style="display:flex;align-items:center;gap:4px">
      <span id="downBtn" onclick="downAll()" style="cursor:pointer;font-size:24px;user-select:none;padding:6px 10px;border-radius:8px;transition:background .2s" onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='transparent'" title="从云端下载覆盖本地数据">⬇</span>
      <span id="syncBtn" onclick="syncAll()" style="cursor:pointer;font-size:26px;user-select:none;padding:6px 10px;border-radius:8px;transition:background .2s" onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='transparent'" title="手动同步所有数据到云端">☁</span>
    </div>
  </div>
  <div class="card" style="margin-bottom:16px">
    <div class="card-title"><span class="icon" style="background:#0066cc">¥</span>利润</div>
    <div style="font-size:12px;color:#86868b;margin-bottom:12px"><span id="dateDisplay"></span></div>
    <div class="income-grid" style="grid-template-columns:1fr 1fr">
      <div class="income-item">
        <div class="income-label">总利润</div>
        <div class="income-value"><span class="symbol" style="color:#0066cc">¥</span><span id="totalProfit">0.00</span></div>
      </div>
      <div class="income-item">
        <div class="income-label">日净利润</div>
        <div class="income-value"><span class="symbol" style="color:#0066cc">¥</span><span id="dailyProfit" class="income-static">0.00</span></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:10px;font-size:12px;color:#86868b">
      <span>💰</span>
      <a id="incHistToggle" style="color:#0066cc;cursor:pointer;text-decoration:none" onclick="toggleIncHist()">查看收支明细</a>
    </div>
    <div id="incHistPanel" style="display:none;margin-top:8px;max-height:200px;overflow-y:auto"></div>
    <div style="margin-top:10px;border-top:0.5px solid rgba(0,0,0,.06);padding-top:10px">
      <div style="display:flex;align-items:center;gap:10px;font-size:12px">
        <span style="color:#86868b">📋</span>
        <a id="histToggle" style="color:#0066cc;cursor:pointer;text-decoration:none" onclick="toggleHist()">查看历史完成</a>
        <span style="color:#c7c7cc;font-size:11px">（主线任务完成后自动归档）</span>
      </div>
      <div id="histPanel" style="display:none;margin-top:8px;max-height:200px;overflow-y:auto"></div>
    </div>
  </div>
  <div class="task-row">
    <div class="card" style="display:flex;flex-direction:column">
      <div class="card-title"><span class="icon" style="background:#7c3aed">◉</span>日常任务</div>
      <div class="mm-toolbar">
        <button class="mm-p" onclick="mmAddParent()">+ 添加</button>
        <span style="font-size:11px;color:#c7c7cc">▶ 展开/收起 · 点击圆圈完成 · 子任务填利润自动完成</span>
      </div>
      <ul class="mm-list" id="mmList">
        <li class="mm-empty">添加一些日常任务吧</li>
      </ul>
    </div>
    <div class="task-col">
      <div class="card" style="flex:1">
        <div class="card-title"><span class="icon" style="background:#e68a00">★</span>主线任务</div>
        <div class="task-input-row">
          <input type="text" id="mainTaskInput" placeholder="输入新任务，回车添加...">
          <button type="button" onclick="amt()">添加</button>
        </div>
        <ul class="task-list" id="mainTaskList"></ul>
      </div>
      <div class="card" style="flex:1;display:flex;flex-direction:column">
        <div class="card-title"><span class="icon" style="background:#34c759"><svg width="12" height="12" viewBox="0 0 24 24" fill="#fff" stroke="none"><path d="M12 2L2 12l10 10 10-10L12 2z"/></svg></span>可选任务</div>
        <div class="task-input-row">
          <input type="text" id="devTaskInput" placeholder="输入新任务，回车添加...">
          <button type="button" onclick="adt()">添加</button>
        </div>
        <ul class="task-list" id="devTaskList"></ul>
      </div>
    </div>
  </div>
</div>
<script>
// ===================== 数据层 =====================
function _utf8_to_b64(str){return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g,function(m,p1){return String.fromCharCode('0x'+p1);}));}
function _b64_to_utf8(str){return decodeURIComponent(atob(str).split('').map(function(c){return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2);}).join(''));}
function _enc(data,pwd){if(!pwd||pwd==='')return data;var s=JSON.stringify(data),out='';for(var i=0;i<s.length;i++){out+=String.fromCharCode(s.charCodeAt(i)^pwd.charCodeAt(i%pwd.length));}return{__enc:true,payload:_utf8_to_b64(out)};}
function _dec(raw,pwd){if(!raw||typeof raw!=='object'||!raw.__enc)return raw;if(!pwd||pwd==='')return null;try{var s=_b64_to_utf8(raw.payload),out='';for(var i=0;i<s.length;i++){out+=String.fromCharCode(s.charCodeAt(i)^pwd.charCodeAt(i%pwd.length));}return JSON.parse(out);}catch(e){console.error('解密失败',e.message);return null;}}
function _doSync(k,b){
  return new Promise(function(resolve){
    var attempts=0;
    function push(){
      attempts++;
      fetch('https://lmfvfaobkmraiajodede.supabase.co/rest/v1/app_data',{method:'POST',headers:{'apikey':'sb_publishable_8sesGXR0bAHLkOgqMD7kUg_qoWT8Haq','Authorization':'Bearer sb_publishable_8sesGXR0bAHLkOgqMD7kUg_qoWT8Haq','Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},body:b})
      .then(function(r){
        if(r.ok){console.log('☁️ 同步成功:',k);resolve(true);return;}
        if(attempts<3){console.warn('☁️ 同步重试('+attempts+'):',k);setTimeout(push,3000*attempts);}
        else{console.error('☁️ 同步失败:',k,r.status);resolve(false);}
      })
      .catch(function(e){
        if(attempts<3){console.warn('☁️ 网络错误,重试('+attempts+'):',k);setTimeout(push,3000*attempts);}
        else{console.error('☁️ 同步失败(网络):',k,e.message);resolve(false);}
      });
    }
    push();
  });
}
function sd(k,d,opts){
  opts=opts||{};
  if(k==='password'){localStorage.setItem('zhuye2_'+k,d);}
  else{localStorage.setItem('zhuye2_'+k,JSON.stringify(d));}
  if(!opts.push)return;
  var pwd=localStorage.getItem(PK)||'';
  var bodyObj={id:k,data:(k==='password'?d:_enc(d,pwd)),updated_at:new Date().toISOString()};
  return _doSync(k,JSON.stringify(bodyObj));

function enableDragSort(listEl,getData,setData,renderFn,itemSelector){
  var items=Array.from(listEl.querySelectorAll(itemSelector||':scope > li'));
  items.forEach(function(item,idx){
    if(item.classList.contains('mm-empty'))return;
    item.draggable=true;
    item.dataset.dragIndex=idx;
    item.addEventListener('dragstart',function(e){
      e.dataTransfer.effectAllowed='move';
      this.classList.add('dragging');
      e.dataTransfer.setData('text/plain',idx);
    });
    item.addEventListener('dragend',function(){this.classList.remove('dragging');});
    item.addEventListener('dragover',function(e){
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      items.forEach(function(it){it.classList.remove('drag-over');});
      this.classList.add('drag-over');
    });
    item.addEventListener('dragleave',function(){this.classList.remove('drag-over');});
    item.addEventListener('drop',function(e){
      e.preventDefault();
      items.forEach(function(it){it.classList.remove('drag-over');});
      var srcIdx=parseInt(e.dataTransfer.getData('text/plain'));
      var tgtIdx=parseInt(this.dataset.dragIndex);
      if(srcIdx===tgtIdx||isNaN(srcIdx)||isNaN(tgtIdx))return;
      var data=getData();
      var oldData=data.slice();
      var moved=data.splice(srcIdx,1)[0];
      data.splice(tgtIdx,0,moved);
      setData(data,oldData);
      renderFn();
    });
  });
}

        // 利润输入
        var prfInp=document.createElement('input');prfInp.className='mm-profit-input';prfInp.placeholder='¥';prfInp.inputMode='decimal';prfInp.value=(c.profit?c.profit:'');

        cli.appendChild(clb);
        var cd=document.createElement('button');cd.className='mm-del';cd.textContent='✕';cd.onclick=function(){p.children.splice(j,1);mmSave();mmRender();calcDailyIncome();};

      });
      enableDragSort(childUl,function(){return p.children;},function(d){p.children=d;mmSave();},mmRender,':scope > li');

  calcDailyIncome();

// ===================== 手动同步按钮 =====================
function showToast(msg,type){
  type=type||'info';
  var t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:60px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:8px;font-size:13px;color:#fff;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;';document.body.appendChild(t);}
  t.style.background=type==='ok'?'#34c759':(type==='err'?'#ff3b30':'#007aff');
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._hideT);t._hideT=setTimeout(function(){t.style.opacity='0';},2500);
}
function syncAll(){
  document.querySelectorAll('.mm-label-input').forEach(function(el){el.blur();});
  try{
  var ks=['mainTasks','mindmap','mmDate','mtDate','devTasks','devDate','devTaskHistory','taskHistory','mmIncomeHistory','totalProfitAccumulated'];
  var promises=[],count=0;
  var pwd=localStorage.getItem(PK);
  if(pwd){count++;promises.push(sd('password',pwd,{push:true}));}
  ks.forEach(function(k){var d=ld(k,null);if(d!==null){count++;promises.push(sd(k,d,{push:true}));}});
  if(!count){showToast('无数据需要同步','info');return;}
  document.getElementById('syncBtn').textContent='☁️';
  showToast('正在同步 '+count+' 项...','info');
  Promise.all(promises).then(function(results){
    var ok=results.filter(function(r){return r;}).length;

    else{showToast('⚠️ 同步完成 ('+ok+'/'+count+')','err');}
    setTimeout(function(){document.getElementById('syncBtn').textContent='☁';},1500);
  });
  }catch(e){console.error('syncAll 错误:',e);showToast('同步出错: '+e.message,'err');document.getElementById('syncBtn').textContent='☁';}
}
